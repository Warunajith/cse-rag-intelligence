<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 680" role="img" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
<title>CSE RAG Intelligence — system architecture</title>
<desc>Four-layer architecture: a Next.js frontend proxies to a FastAPI serving layer, which queries OpenSearch and enqueues jobs to Redis. A separate worker consumes those jobs, fetches reports from the CSE API, and indexes them into OpenSearch, Postgres, and MinIO.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Explicit background so the diagram stays readable on GitHub's dark mode -->
<rect x="0" y="0" width="680" height="680" fill="#ffffff"/>

<!-- Tier 1: Frontend -->
<text x="40" y="36" font-size="12" fill="#5b6b66">Frontend · Next.js app router</text>
<rect x="40" y="46" width="600" height="90" rx="14" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<rect x="58" y="62" width="180" height="56" rx="8" fill="#fafdf9" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="148" y="80" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Ask interface</text>
<text x="148" y="100" font-size="12" fill="#0F6E56" text-anchor="middle">Streaming + citations</text>
<rect x="250" y="62" width="180" height="56" rx="8" fill="#fafdf9" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="340" y="80" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Company browser</text>
<text x="340" y="100" font-size="12" fill="#0F6E56" text-anchor="middle">Search and filter</text>
<rect x="442" y="62" width="180" height="56" rx="8" fill="#fafdf9" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="532" y="80" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Catalog controls</text>
<text x="532" y="100" font-size="12" fill="#0F6E56" text-anchor="middle">Index on demand</text>

<!-- Arrow: Frontend to Serving -->
<line x1="340" y1="136" x2="340" y2="178" stroke="#9aa8a3" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
<text x="350" y="162" font-size="11" fill="#7d8a85">/api/* proxy</text>

<!-- Tier 2: Serving -->
<text x="40" y="196" font-size="12" fill="#5b6b66">Serving layer · FastAPI (stateless)</text>
<rect x="40" y="206" width="600" height="100" rx="14" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<rect x="56" y="224" width="130" height="56" rx="8" fill="#fafcfe" stroke="#85B7EB" stroke-width="0.5"/>
<text x="121" y="244" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">rag_service</text>
<text x="121" y="264" font-size="12" fill="#185FA5" text-anchor="middle">/ask  /search</text>
<rect x="200" y="224" width="136" height="56" rx="8" fill="#fafcfe" stroke="#85B7EB" stroke-width="0.5"/>
<text x="268" y="244" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">frontend_api</text>
<text x="268" y="264" font-size="12" fill="#185FA5" text-anchor="middle">/ask/stream SSE</text>
<rect x="350" y="224" width="130" height="56" rx="8" fill="#fafcfe" stroke="#85B7EB" stroke-width="0.5"/>
<text x="415" y="244" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">catalog_api</text>
<text x="415" y="264" font-size="12" fill="#185FA5" text-anchor="middle">Enqueue jobs</text>
<rect x="494" y="224" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="559" y="244" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle">Reranker</text>
<text x="559" y="264" font-size="12" fill="#534AB7" text-anchor="middle">Optional</text>

<!-- Dashed: rag_service to reranker -->
<line x1="186" y1="252" x2="492" y2="252" stroke="#AFA9EC" stroke-width="0.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>

<!-- Arrow: catalog_api to Redis -->
<line x1="415" y1="306" x2="415" y2="382" stroke="#9aa8a3" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
<text x="423" y="350" font-size="11" fill="#7d8a85">Enqueue</text>

<!-- Arrow: serving to OpenSearch -->
<line x1="121" y1="306" x2="121" y2="534" stroke="#9aa8a3" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
<text x="129" y="432" font-size="11" fill="#7d8a85">Hybrid query</text>

<!-- Tier 3: Ingestion -->
<text x="40" y="396" font-size="12" fill="#5b6b66">Ingestion · async worker subsystem</text>
<rect x="40" y="406" width="430" height="110" rx="14" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5" stroke-dasharray="6 3"/>
<rect x="60" y="424" width="166" height="56" rx="8" fill="#fefcf6" stroke="#EF9F27" stroke-width="0.5"/>
<text x="143" y="444" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">Redis</text>
<text x="143" y="464" font-size="12" fill="#854F0B" text-anchor="middle">2 priority queues</text>
<rect x="250" y="424" width="200" height="74" rx="8" fill="#fefcf6" stroke="#EF9F27" stroke-width="0.5"/>
<text x="350" y="442" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">Worker</text>
<text x="350" y="460" font-size="12" fill="#854F0B" text-anchor="middle">Discover · download</text>
<text x="350" y="478" font-size="12" fill="#854F0B" text-anchor="middle">Parse · chunk · index</text>

<!-- Arrow: Redis to Worker -->
<line x1="226" y1="452" x2="248" y2="452" stroke="#9aa8a3" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

<!-- External: CSE.lk -->
<rect x="510" y="424" width="140" height="56" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
<text x="580" y="444" font-size="14" font-weight="500" fill="#712B13" text-anchor="middle">CSE.lk API</text>
<text x="580" y="464" font-size="12" fill="#993C1D" text-anchor="middle">Reports + PDFs</text>

<!-- Arrow: Worker to CSE.lk -->
<line x1="450" y1="452" x2="508" y2="452" stroke="#9aa8a3" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

<!-- Arrow: Worker to Storage -->
<line x1="350" y1="498" x2="350" y2="534" stroke="#9aa8a3" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

<!-- Dashed: serving to Postgres -->
<line x1="268" y1="306" x2="340" y2="576" stroke="#85B7EB" stroke-width="0.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>

<!-- Tier 4: Storage -->
<text x="40" y="552" font-size="12" fill="#5b6b66">Storage tier</text>
<rect x="40" y="562" width="600" height="90" rx="14" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="58" y="578" width="180" height="56" rx="8" fill="#fafaf8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="148" y="598" font-size="14" font-weight="500" fill="#444441" text-anchor="middle">OpenSearch</text>
<text x="148" y="618" font-size="12" fill="#5F5E5A" text-anchor="middle">BM25 + kNN hybrid</text>
<rect x="250" y="578" width="180" height="56" rx="8" fill="#fafaf8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="340" y="598" font-size="14" font-weight="500" fill="#444441" text-anchor="middle">PostgreSQL</text>
<text x="340" y="618" font-size="12" fill="#5F5E5A" text-anchor="middle">Catalog + status</text>
<rect x="442" y="578" width="180" height="56" rx="8" fill="#fafaf8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="532" y="598" font-size="14" font-weight="500" fill="#444441" text-anchor="middle">MinIO</text>
<text x="532" y="618" font-size="12" fill="#5F5E5A" text-anchor="middle">Raw PDF store</text>
</svg>
